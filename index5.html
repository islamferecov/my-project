<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form
      style="display: flex; flex-direction: column; gap: 10px; width: 200px"
    >
      <label for="text">Ad, Soyad:</label>
      <input type="text" placeholder="Ad, Soyad daxil edin..." />

      <label for="email">E-mail:</label>
      <input type="email" placeholder="E-mail adress-inizi daxil edin..." />

      <label for="password">Şifrə:</label>
      <input type="password" placeholder="Şifrə daxil edin..." />

      <label for="number">Yaş:</label>
      <input type="number" placeholder="Yaşınızı daxil edin..." />

      <label for="date">Doğum tarixi:</label>
      <input type="date" placeholder="Doğulduğunuz tarixi qeyd edin..." />

      <br />

      <label for="textarea">Haqqınızda:</label>
      <textarea placeholder="Özünüz haqqında 3 cümlə qeyd edin..."></textarea>

      <br />

      <label for="dropdown">Şəhər:</label>
      <select id="dropdown" name="dropdown">
        <option id="...">...</option>
        <option id="Bakı">Bakı</option>
        <option id="Sumqayıt">Sumqayıt</option>
        <option id="Gəncə">Gəncə</option>
      </select>

      <br />

      <label for="radio">Cins:</label>

      <label for="radio"><input type="radio" name="cins" />Kişi</label>
      <label for="radio"><input type="radio" name="cins" />Qadın</label>

      <br />

      <label for="checkbox">Maraqlarınız:</label>

      <label><input type="checkbox" />Musiqi</label>
      <label><input type="checkbox" />Sosial Medya</label>
      <label><input type="checkbox" />Kitab oxumaq</label>

      <br />

      <button type="submit">Göndər</button>

      <button type="reset">Reset</button>
    </form>
  </body>
</html>
